<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国石化职称查询结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #1E2A3F;
            padding-bottom: 50px;
        }
        .top-header {
            background: #0052CC;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 3px solid #FFCC00;
        }
        /* 强制固定Logo尺寸，禁止变大变形 */
        .logo-img {
            height: 38px;
            width: auto;
            max-width: 100px;
            margin-right: 12px;
            display: block;
        }
        .top-header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: normal;
        }

        .cert-wrapper {
            max-width: 580px;
            width: 92%;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .cert-top {
            height: 60px;
            background: linear-gradient(90deg, #FFB800, #FFD54F, #FFB800);
        }
        .cert-body {
            padding: 40px 30px;
            background: #FFFDF5;
        }
        .user-name {
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .divider {
            height: 2px;
            background: #999;
            margin: 0 20px 30px;
        }
        .info-item {
            display: flex;
            padding: 15px 10px;
            border-bottom: 1px solid #E8E8E8;
            font-size: 18px;
        }
        .info-label {
            width: 130px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="top-header">
    <img class="logo-img" src="https://bkimg.cdn.bcebos.com/pic/738b4710b912c8fcc3cea98eba588545d688d43f8b67?x-bce-process=image/format,f_auto/quality,Q_70/resize,m_lfit,limit_1,w_536">
    <h1>中国石化职称查询结果</h1>
</div>

<div class="cert-wrapper">
    <div class="cert-top"></div>
    <div class="cert-body">
        <div class="user-name">赵锐利（男）</div>
        <div class="divider"></div>
        <div class="info-item"><div class="info-label">出生年月：</div><div>1983.11</div></div>
        <div class="info-item"><div class="info-label">身份证号：</div><div>370521*********14</div></div>
        <div class="info-item"><div class="info-label">工作单位：</div><div>中石化胜利石油工程有限公司</div></div>
        <div class="info-item"><div class="info-label">职称：</div><div>高级工程师</div></div>
        <div class="info-item"><div class="info-label">专业名称：</div><div>石油工程</div></div>
        <div class="info-item"><div class="info-label">批准日期：</div><div>2024.12.17</div></div>
        <div class="info-item"><div class="info-label">证书编号：</div><div>S20240010533W</div></div>
    </div>
</div>

</body>
</html>
